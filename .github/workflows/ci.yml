name: cloud-ci-minimum

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show runner tools
        run: |
          docker --version || true
          docker compose version || true
          kubectl version --client || true

      - name: Run repository validation
        shell: bash
        run: |
          chmod +x scripts/ci_validate.sh
          ./scripts/ci_validate.sh
